name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [ "3.11", "3.12" ]

    # Option A: set LVRA_SETTINGS for all steps at the job level
    env:
      LVRA_SETTINGS: data/public_settings_ci.yaml

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run tests with coverage
        # ensure your package import works; add repository code to PYTHONPATH if needed
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/lvra
          pytest --cov=lvra --cov-report=html --cov-report=term-missing -q

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ matrix.python-version }}
          path: htmlcov/
